name: KLEE Test
on:
    push:
        branches: [ master ]
jobs:
    job_id:
        runs-on: ubuntu-latest
        container:
            image: klee/klee:2.1
            options: -u 0 --ulimit="stack=-1:-1"
        steps:
            - uses: actions/checkout@v2

            - name: Run in container
              run: |
                  echo This job does specify a container.
                  echo It runs in the container instead of the VM.
                  echo Hello > h.txt

            - run: |
                  echo This is the second run step.
                  cat h.txt
              name: Second step.

            - name: Create Build Environment
              run: cmake -E make_directory ${{ runner.workspace }}/build

            - name: Configure CMake
              run: |
                  cd "${{ runner.workspace }}/build"
                  echo $GITHUB_WORKSPACE
                  ls /github/workspace
                  cmake /github/workspace -G "Unix Makefiles" -D CMAKE_BUILD_TYPE=Debug -D CMAKE_CXX_COMPILER=clang++ -D CMAKE_C_COMPILER=clang -D PSTORE_BITCODE=Yes -D PSTORE_DISABLE_UINT128_T=Yes -D PSTORE_EXAMPLES=No -D PSTORE_EXCEPTIONS=No

            - name: Build
              working-directory: ${{ runner.workspace }}/build
              run: cmake --build . --target pstore-klee-run-all
